name: Daily CCASS Email
on:
  schedule:
    # 5:00 AM HKT is 9:00 PM UTC (previous day)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas curl_cffi lxml

      - name: Run report script
        env:
          # This connects the GitHub Secret to the Python variable
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_report.py
